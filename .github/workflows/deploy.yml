name: Deploy to GitHub Pages

# Build and publish the app whenever you push to the default branch.
# Deploying a new version = push your commits; this workflow does the rest.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let only one deploy run at a time; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Diagnostic: reports whether the build can see the config, WITHOUT ever
      # printing the values themselves (the `!= ''` yields only true/false).
      - name: Check Supabase config source
        run: |
          echo "vars.VITE_SUPABASE_URL present:         ${{ vars.VITE_SUPABASE_URL != '' }}"
          echo "secrets.VITE_SUPABASE_URL present:      ${{ secrets.VITE_SUPABASE_URL != '' }}"
          echo "vars.VITE_SUPABASE_ANON_KEY present:    ${{ vars.VITE_SUPABASE_ANON_KEY != '' }}"
          echo "secrets.VITE_SUPABASE_ANON_KEY present: ${{ secrets.VITE_SUPABASE_ANON_KEY != '' }}"
      - run: npm run build
        # Supabase cloud sync for the deployed site. Reads repository Variables,
        # falling back to Secrets, so it works whichever tab you used. Unset in
        # both = pure-offline deploy. The anon key is publishable (it ships in
        # the public JS bundle), so repository Variables is the natural place.
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
      # Requires Pages enabled once: Settings → Pages → Source = "GitHub Actions"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
